name: CI Pipeline

on: 
  workflow_call: 
    secrets:
      SONAR_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
        
      

jobs:
  unit-tests:
    name: running unit tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7.0.0
      - name: setup python
        uses: actions/setup-python@v6.3.0
        with:
          python-version : '3.10'
      - name: install dependancies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: run unit tests
        run: |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v
      
      - name: upload code coverage reports
        uses: actions/upload-artifact@v7.0.1
        with:
          name: unit-test-code-coverage-report
          path: reports/

# upload the analysis in security tab
# permission required for workflow execution to do that 
  codeql: 
    name: codeQL for check vulernabilty in code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write #to uplaod the analysis report 
      
    strategy:
      matrix: 
        language: [ 'python']  
      
    steps:
      - name: checkout code
        uses: actions/checkout@v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"
  
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v7.0.0 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      - name: Download coverage report
        uses: actions/download-artifact@v8.0.1
        with:
          name: unit-test-code-coverage-report
          path: reports/
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}        
      - name: SonarQube Quality Gate Check 
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [ codeql, sonarqube]
    if: success()
    outputs:
      image-tags: ${{ steps.vars.outputs.IMAGE_TAGS }}
    steps: 
      - name: checkout code
        uses: actions/checkout@v7.0.0
      
      # - name: Build docker image
      #   run: |
      #     docker build -t my-flask-app .
      - name: setup docker buildx
        uses: docker/setup-buildx-action@v3.0.0
        
      - name: generate image tags
        id: vars
        run: |
          IMAGE_TAGS="${{ github.run_id }}-${GITHUB_SHA:0:7}"
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> $GITHUB_OUTPUT

      - name: Build Image (no push)
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: viki_app:${{ steps.vars.outputs.IMAGE_TAGS }}
          load: true

      - name: save docker image 
        run: docker save viki_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o viki_app.tar

      - name: upload docker image artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: viki_app
          path: viki_app.tar
            
  publish-dockerimage:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download the Image
        uses: actions/download-artifact@v5.0.0
        with:
          name: viki_app
          path: .

      - name: Load Docker Images
        run: docker load -i viki_app.tar

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tags }}"
          docker image tag viki_app:$IMAGE_TAG ${{ secrets.DOCKERHUB_USERNAME}}/viki_app:$IMAGE_TAG
     
      - name: Debug build output
        run: |
          echo "IMAGE_TAG=[${{ needs.build.outputs.image-tags }}]"    
          docker images

      - name: Push Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tags}}"
          docker image push ${{ secrets.DOCKERHUB_USERNAME}}/viki_app:$IMAGE_TAG
        
  publish-ghcr:
    name: Publish to github container registry
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      contents: read

    steps:
      - name: Download the Image
        uses: actions/download-artifact@v5.0.0
        with:
          name: viki_app
          path: .

      - name: Load Docker Images
        run: docker load -i viki_app.tar

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}   #who trigger this job
          password: ${{ secrets.GITHUB_TOKEN }}  #github auto creates a GITHUBHUB_TOKEN secret to use is your workflow na need to generate manually
# push to ghcr, create releases, add comments, create issues, read content of repo access
      - name: Tag Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tags }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker image tag viki_app:$IMAGE_TAG ghcr.io/$OWNER/viki_app:$IMAGE_TAG

      - name: Push Image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tags}}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker image push ghcr.io/$OWNER/viki_app:$IMAGE_TAG      
