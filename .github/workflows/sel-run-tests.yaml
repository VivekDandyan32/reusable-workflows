---
name: reusable workflow for sel run test
on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: deployment env prod stage
        required: true
        type: string
    

jobs:
  sel-tests:
    environment: ${{ inputs.ENVIRONMENT }}
    runs-on: github-actions-scaleset-config-demo
    steps:
      - name: code checkout
        uses: actions/checkout@v5
     
      - name: Run Selenium Tests
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: |
          mkdir -p reports
          pytest tests/ --html=reports/selenium-report.html --self-contained-html
     
      - name: Upload Selenium Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: reports/
